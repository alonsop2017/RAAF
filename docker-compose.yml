services:

  # ── Data initialisation ──────────────────────────────────────────────────────
  # Runs ONCE before any other service.
  # • Creates the required directory structure on the host bind-mounts.
  # • Downloads and extracts the latest Google Drive backup (via rclone) unless
  #   existing data is already present.
  # Set FORCE_RESTORE=true in .env to overwrite existing data on next `up`.
  raaf-data-init:
    image: rclone/rclone:latest        # Alpine-based; ships rclone + sh
    container_name: raaf-data-init
    restart: "no"
    volumes:
      - ../data:/mnt/data
      - ../clients:/mnt/clients
      - ../archive:/mnt/archive
      - ../logs:/mnt/logs
      - ../config:/mnt/config
      - ./docker/data-init.sh:/data-init.sh:ro
      # Mount host rclone config so the container can reach Google Drive.
      # Override with RCLONE_CONFIG_DIR in your shell or .env if needed.
      - ${HOME}/.config/rclone:/root/.config/rclone:ro
    environment:
      - GDRIVE_REMOTE=${GDRIVE_REMOTE:-raaf-backup:RAAF-Backups}
      - FORCE_RESTORE=${FORCE_RESTORE:-false}
    entrypoint: /bin/sh
    command: /data-init.sh

  # ── Pre-start data verification ──────────────────────────────────────────────
  # Runs after data-init completes.
  # Checks directory structure, SQLite integrity, schema, and critical config
  # files.  The application will NOT start if any critical check fails.
  raaf-verify:
    image: python:3.11-slim
    container_name: raaf-verify
    restart: "no"
    volumes:
      - ../data:/app/data
      - ../clients:/app/clients
      - ../archive:/app/archive
      - ../logs:/app/logs
      - ../config:/app/config
      - ./docker/verify_data.py:/app/docker/verify_data.py:ro
    working_dir: /app
    env_file:
      - path: .env
        required: false
    command: python docker/verify_data.py
    depends_on:
      raaf-data-init:
        condition: service_completed_successfully

  # ── Web application ──────────────────────────────────────────────────────────
  raaf-app:
    build: .
    image: raaf:latest
    container_name: raaf-app
    restart: unless-stopped
    command: uvicorn
    env_file: .env
    environment:
      - RAAF_DB_MODE=db
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
    volumes:
      - ../data:/app/data               # SQLite DB
      - ../clients:/app/clients        # Client & requisition data
      - ../archive:/app/archive        # Archived requisitions
      - ../logs:/app/logs              # Application logs
      - ../config:/app/config          # Secrets & runtime config (users.db, tokens)
      - ../backups:/app/backups        # Local backup target for cron
    networks:
      - raaf-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      raaf-verify:
        condition: service_completed_successfully

  # ── PCR sync cron ────────────────────────────────────────────────────────────
  raaf-cron:
    image: raaf:latest
    container_name: raaf-cron
    restart: unless-stopped
    command: cron
    env_file: .env
    environment:
      - RAAF_DB_MODE=db
      - PYTHONPATH=/app
      - PYTHONIOENCODING=utf-8
    volumes:
      - ../data:/app/data
      - ../clients:/app/clients
      - ../archive:/app/archive
      - ../logs:/app/logs
      - ../config:/app/config
      - ../backups:/app/backups
    networks:
      - raaf-network
    depends_on:
      raaf-app:
        condition: service_healthy

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: raaf-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/raaf.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks:
      - raaf-network
    depends_on:
      - raaf-app

  # ── Let's Encrypt cert renewal ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: raaf-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # Run manually for first cert: docker compose run --rm certbot certonly ...
    # Renewal handled by the loop below
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

networks:
  raaf-network:
    driver: bridge
