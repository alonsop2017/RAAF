database:
  url: sqlite:///config/users.db
assessment:
  default_max_score: 100
  default_thresholds:
    strong_recommend: 85
    recommend: 70
    conditional: 55
stability:
  weights:
    four_plus_years: 10
    three_to_four_years: 8
    two_to_three_years: 6
    eighteen_months_to_two_years: 4
    one_to_eighteen_months: 2
    less_than_one_year: 0
report:
  font_family: Arial
  body_font_size: 11
  heading_font_size: 14
  margins_inches: 1.0
  header_shading: D5E8F0
output:
  date_format: '%Y-%m-%d'
  filename_date_format: '%y%m%d'
paths:
  client_root: clients/{client}
  requisition_root: clients/{client}/requisitions/{req}
  archive_root: archive/{client}
  log_root: logs/{client}
context:
  file: .current_context.yaml
  auto_save: true
pcr:
  api_base_url: https://www2.pcrecruiter.net/rest/api
  api_version: v2
  session_timeout_minutes: 60
  sync_interval_minutes: 15
  default_pipeline_statuses:
    new: New Applicant
    assessed: Assessed
    interview: Interview Scheduled
    hold: On Hold
    rejected: Not Selected
    hired: Hired
batch:
  max_candidates_per_batch: 50
  auto_create_batch: true
  batch_naming_pattern: batch_{date}_{n}
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  rotate_size_mb: 10
  backup_count: 5
claude:
  default_model: claude-sonnet-4-6
  max_tokens: 8192
  temperature: 0.1
  timeout_seconds: 120
backup:
  drive_folder_id: 1ESLhisZ7ixBB3t6SrKNM494yV4EO4KQY
  drive_keep_n: 3
  lan_path: /media/alonsop/Backup/RBPi5_Backup
