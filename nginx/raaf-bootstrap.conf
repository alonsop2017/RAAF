# Bootstrap nginx config — HTTP only.
# Used during initial Let's Encrypt certificate issuance.
# After certs are obtained, switch to raaf.conf and reload nginx.

server {
    listen 80;
    server_name _;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to the app during bootstrap
    location / {
        proxy_pass         http://raaf-app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
    }
}
